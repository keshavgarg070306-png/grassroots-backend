services:
  - type: web
    name: grassroots-backend
    env: docker
    region: oregon
    plan: free
    healthCheckPath: /
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080
      - key: DB_HOST
        fromDatabase:
          name: grassroots-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: grassroots-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: grassroots-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: grassroots-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: grassroots-db
          property: password
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: grassroots-db
    databaseName: grassroots
    user: grassroots_user
    region: oregon
    plan: free
