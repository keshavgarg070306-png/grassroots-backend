version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: grassroots-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: grassroots_db
      POSTGRES_USER: grassroots_user
      POSTGRES_PASSWORD: grassroots_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
